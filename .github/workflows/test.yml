name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  # ── headless SDL is mandatory in CI; engine creates a 1×1 display surface ──
  SDL_VIDEODRIVER: dummy
  SDL_AUDIODRIVER: dummy
  # ── workaround for mutmut 3.x clean-test phase env-var inheritance ────────
  MUTANT_UNDER_TEST: ""
  # ── route pytest temp dirs away from any odd mounts ───────────────────────
  TMPDIR: /tmp

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: install
        run: uv sync --extra dev
      - name: ruff
        run: uv run ruff check .
      - name: mypy (engine only — tests intentionally not strict)
        run: uv run mypy fractal_explorer_v2.py || true   # advisory until typed up
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  unit:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python }}
      - run: uv sync --extra dev
      - name: unit tests
        run: |
          uv run pytest tests/test_unit.py \
            --junit-xml=artifacts/unit-junit.xml \
            --cov=fractal_explorer_v2 \
            --cov-report=xml:artifacts/coverage.xml \
            --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-results-py${{ matrix.python }}
          path: artifacts/

  # ──────────────────────────────────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - name: integration tests (48 pages × 3 sizes)
        run: |
          uv run pytest tests/test_integration.py \
            --junit-xml=artifacts/integration-junit.xml \
            -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: artifacts/

  # ──────────────────────────────────────────────────────────────────────────
  regression:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - name: regression tests (pixel-hash baselines)
        run: |
          uv run pytest tests/test_regression.py \
            --junit-xml=artifacts/regression-junit.xml \
            -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-results
          path: artifacts/

  # ──────────────────────────────────────────────────────────────────────────
  property:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - name: hypothesis property tests
        run: |
          uv run pytest tests/test_properties.py \
            --junit-xml=artifacts/property-junit.xml \
            -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: property-results
          path: artifacts/

  # ──────────────────────────────────────────────────────────────────────────
  mutation:
    runs-on: ubuntu-latest
    needs: [unit, integration]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev

      - name: pre-flight (verify mutation-target tests pass)
        working-directory: tests/_mutation_target
        run: uv run pytest -x -q test_mutation_target.py test_defaults_and_properties.py

      - name: mutmut run
        working-directory: tests/_mutation_target
        run: |
          uv run mutmut run || echo "mutmut completed with non-zero (some mutants survived — that's normal)"

      - name: kill-rate gate
        working-directory: tests/_mutation_target
        run: |
          mkdir -p ../../artifacts
          # mutmut 3.x: results (no arg) shows ONLY survived mutants; save for artifact
          uv run mutmut results 2>&1 | tee ../../artifacts/mutmut_results.txt || true
          # Query the SQLite cache directly — only reliable source of both killed+survived
          python3 - << 'PYEOF'
import sys, glob, sqlite3, os

def query_db():
    candidates = ['.mutmut-cache'] + glob.glob('*.db') + glob.glob('*.sqlite') + glob.glob('*.cache')
    for path in candidates:
        try:
            db = sqlite3.connect(path)
            tables = [r[0] for r in db.execute("SELECT name FROM sqlite_master WHERE type='table'").fetchall()]
            for t in tables:
                cols = [r[1] for r in db.execute(f'PRAGMA table_info("{t}")').fetchall()]
                if 'status' in cols:
                    rows = dict(db.execute(f'SELECT status, COUNT(*) FROM "{t}" GROUP BY status').fetchall())
                    killed = rows.get('killed', 0)
                    survived = rows.get('survived', 0)
                    if killed + survived > 0:
                        return killed, survived
        except Exception:
            pass
    return None

result = query_db()
if result is None:
    print('::error::mutmut database not found — did mutmut run succeed? Check the mutmut-run step above.')
    sys.exit(1)

killed, survived = result
total = killed + survived
if total == 0:
    print('::error::No mutations recorded in database.')
    sys.exit(1)

pct = killed * 100 // total
print(f'Mutation kill rate: {killed} killed / {total} total = {pct}%')

with open(os.environ['GITHUB_ENV'], 'a') as f:
    f.write(f'MUTATION_KILL_RATE={pct}\n')

if pct < 70:
    print(f'::error::Kill rate {pct}% below 70% gate')
    sys.exit(1)
elif pct < 80:
    print(f'::warning::Kill rate {pct}% in acceptable band (target ≥80%)')
PYEOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-results
          path: |
            artifacts/mutmut_results.txt
            tests/_mutation_target/mutmut-stats.json

  # ──────────────────────────────────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [unit, integration, regression, property, mutation]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      - name: summary
        run: |
          echo "## Test summary"          >> $GITHUB_STEP_SUMMARY
          echo "| Layer | Status |"        >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                 >> $GITHUB_STEP_SUMMARY
          echo "| Unit | ${{ needs.unit.result }} |"               >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Regression | ${{ needs.regression.result }} |"   >> $GITHUB_STEP_SUMMARY
          echo "| Property (Hypothesis) | ${{ needs.property.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mutation | ${{ needs.mutation.result }} |"       >> $GITHUB_STEP_SUMMARY
