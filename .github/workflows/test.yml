name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  # ── headless SDL is mandatory in CI; engine creates a 1×1 display surface ──
  SDL_VIDEODRIVER: dummy
  SDL_AUDIODRIVER: dummy
  # ── workaround for mutmut 3.x clean-test phase env-var inheritance ────────
  MUTANT_UNDER_TEST: ""
  # ── route pytest temp dirs away from any odd mounts ───────────────────────
  TMPDIR: /tmp

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: install
        run: uv sync --extra dev
      - name: ruff
        run: uv run ruff check .
      - name: mypy (engine only — tests intentionally not strict)
        run: uv run mypy fractal_explorer_v2.py || true   # advisory until typed up
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  unit:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python }}
      - run: uv sync --extra dev
      - name: unit tests
        run: |
          uv run pytest tests/test_unit.py \
            --junit-xml=artifacts/unit-junit.xml \
            --cov=fractal_explorer_v2 \
            --cov-report=xml:artifacts/coverage.xml \
            --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-results-py${{ matrix.python }}
          path: artifacts/

  # ──────────────────────────────────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - name: integration tests (52 pages × 3 sizes)
        run: |
          uv run pytest tests/test_integration.py \
            --junit-xml=artifacts/integration-junit.xml \
            -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: artifacts/

  # ──────────────────────────────────────────────────────────────────────────
  integration-3d:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - name: 3D integration + C.3 perf gate (30 frames @ 480×360 ≤ 0.500s CI)
        run: |
          uv run pytest tests/test_3d_integration.py \
            --junit-xml=artifacts/3d-integration-junit.xml \
            -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: 3d-integration-results
          path: artifacts/

  # ──────────────────────────────────────────────────────────────────────────
  regression:
    runs-on: ubuntu-latest
    needs: unit
    env:
      NUMBA_DISABLE_JIT: "1"   # disable JIT so numpy rendering is cross-platform deterministic
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - name: regression tests (pixel-hash baselines)
        run: |
          uv run pytest tests/test_regression.py \
            --junit-xml=artifacts/regression-junit.xml \
            -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-results
          path: artifacts/

  # ──────────────────────────────────────────────────────────────────────────
  property:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev
      - name: hypothesis property tests
        run: |
          uv run pytest tests/test_properties.py \
            --junit-xml=artifacts/property-junit.xml \
            -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: property-results
          path: artifacts/

  # ──────────────────────────────────────────────────────────────────────────
  mutation:
    runs-on: ubuntu-latest
    needs: [unit, integration]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev

      - name: pre-flight (verify mutation-target tests pass)
        working-directory: tests/_mutation_target
        run: uv run pytest -x -q test_mutation_target.py test_defaults_and_properties.py

      - name: mutmut run
        working-directory: tests/_mutation_target
        run: |
          uv run mutmut run 2>&1 | tee mutmut_run.log || true

      - name: kill-rate gate
        working-directory: tests/_mutation_target
        run: |
          mkdir -p ../../artifacts
          uv run mutmut results 2>&1 | tee ../../artifacts/mutmut_results.txt || true
          python3 check_kill_rate.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-results
          path: |
            artifacts/mutmut_results.txt
            tests/_mutation_target/mutmut_run.log
            tests/_mutation_target/mutmut-stats.json

  # ──────────────────────────────────────────────────────────────────────────
  perf-numba:
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - name: Numba ≥60fps CI gate (D.1 — escape-time forms @ 800×600 ≤ 16.7ms)
        run: |
          uv run pytest tests/test_perf_numba.py \
            --junit-xml=artifacts/perf-numba-junit.xml \
            -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-numba-results
          path: artifacts/

  # ──────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - name: wheel buildability gate (D.2 — hatch build must succeed)
        run: uv run hatch build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wheel
          path: dist/

  # ──────────────────────────────────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [unit, integration, integration-3d, regression, property, mutation, perf-numba, build]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      - name: summary
        run: |
          echo "## Test summary"          >> $GITHUB_STEP_SUMMARY
          echo "| Layer | Status |"        >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"                 >> $GITHUB_STEP_SUMMARY
          echo "| Unit | ${{ needs.unit.result }} |"               >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3D Integration | ${{ needs.integration-3d.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Regression | ${{ needs.regression.result }} |"   >> $GITHUB_STEP_SUMMARY
          echo "| Property (Hypothesis) | ${{ needs.property.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mutation | ${{ needs.mutation.result }} |"       >> $GITHUB_STEP_SUMMARY
          echo "| Numba ≥60fps (D.1) | ${{ needs.perf-numba.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Wheel build (D.2) | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
